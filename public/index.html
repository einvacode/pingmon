<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PingMon - Network Monitor</title>
  <meta name="description" content="Network Ping Monitor - Real-time device monitoring with uptime reports and alerts">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Alarm Sound -->
  <audio id="alarmSound" loop>
    <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgipCFe3V3fYOLi4R9eXmAiIuIg357en+FiYiFfnp5fYKHiIV/e3l7gIaIhoF9e3t+hIeGgn57e36DhoaCfnt7foOGhoJ+e3t+g4aGgn57e35/fn18fX1+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+fn5+" type="audio/wav">
  </audio>

  <!-- App Shell -->
  <div id="app" class="app-container">
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar(false)"></div>
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo-area">
          <img id="sidebarLogo" src="" alt="Logo" class="sidebar-logo" style="display:none;">
          <div id="sidebarLogoFallback" class="sidebar-logo-fallback">
            <i class="ri-radar-line"></i>
          </div>
          <h1 id="appTitle" class="app-title">PingMon</h1>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard" id="nav-dashboard">
          <i class="ri-dashboard-3-line"></i>
          <span>Dashboard</span>
        </a>
        <a href="#" class="nav-item" data-page="devices" id="nav-devices">
          <i class="ri-server-line"></i>
          <span>Devices</span>
        </a>
        <a href="#" class="nav-item" data-page="reports" id="nav-reports">
          <i class="ri-bar-chart-box-line"></i>
          <span>Laporan</span>
        </a>
        <a href="#" class="nav-item" data-page="alarms" id="nav-alarms">
          <i class="ri-alarm-warning-line"></i>
          <span>Alarm</span>
          <span id="alarmBadge" class="alarm-badge" style="display:none;">0</span>
        </a>
        <a href="#" class="nav-item" data-page="settings" id="nav-settings">
          <i class="ri-settings-3-line"></i>
          <span>Pengaturan</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="company-info">
          <span id="companyName" class="company-name">My Company</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="top-bar">
        <button id="sidebarToggle" class="sidebar-toggle">
          <i class="ri-menu-line"></i>
        </button>
        <div class="top-bar-right">
          <div class="live-clock" id="liveClock"></div>
          <button id="muteBtn" class="alarm-btn" title="Mute Alarm">
            <i class="ri-volume-up-line" id="muteIcon"></i>
          </button>
          <button id="alarmBtn" class="alarm-btn" onclick="navigateTo('alarms')">
            <i class="ri-notification-3-line"></i>
            <span id="alarmBadgeTop" class="alarm-badge-top" style="display:none;">0</span>
          </button>
        </div>
      </header>

      <!-- Page Container -->
      <div class="ticker-container" id="tickerContainer" style="display:none;">
        <div class="ticker-wrapper">
          <div class="ticker-content" id="tickerContent"></div>
        </div>
      </div>
      <div id="pageContainer" class="page-container">
        <!-- Pages loaded dynamically -->
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Modal Overlay -->
  <div id="modalOverlay" class="modal-overlay" style="display:none;" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modalTitle">Modal</h3>
        <button class="modal-close" onclick="closeModal()"><i class="ri-close-line"></i></button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
